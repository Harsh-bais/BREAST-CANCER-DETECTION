<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Breast Cancer Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899; /* Pink-500 */
            --primary-dark: #be185d; /* Pink-700 */
            --secondary: #8b5cf6; /* Violet-500 */
            --bg-dark: #0f172a; /* Slate-900 */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.15) 0px, transparent 50%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Utilities */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Form Layout */
        .form-container {
            padding: 2.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(236, 72, 153, 0.2);
            color: #fda4af;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }

        .tab-content {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .tab-content.active {
            display: grid;
            animation: slideUp 0.4s ease-out;
        }

        /* Inputs */
        .input-group {
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        /* Submit Button */
        .btn-predict {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 3rem auto 0;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.4);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(236, 72, 153, 0.5);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        /* Modal/Result */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.open .modal {
            transform: scale(1);
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .result-value {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .result-prob {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .close-btn {
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feature-category-label {
            grid-column: 1 / -1;
            font-size: 1.25rem;
            color: var(--primary);
            margin: 1.5rem 0 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Breast Cancer Analysis</h1>
            <p class="subtitle">Advanced Neural Network Estimation • Powered by AI</p>
        </header>

        <div class="glass-card form-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('mean')">Mean Values</button>
                <button class="tab-btn" onclick="switchTab('error')">Standard Error</button>
                <button class="tab-btn" onclick="switchTab('worst')">Worst Values</button>
            </div>

            <form id="predictionForm" onsubmit="handlePredict(event)">
                
                <!-- Mean Values Tab -->
                <div id="tab-mean" class="tab-content active">
                    <!-- Standard Mean Features -->
                    <div class="input-group"><label>Mean Radius</label><input type="number" step="any" name="mean radius" value="14.0" required></div>
                    <div class="input-group"><label>Mean Texture</label><input type="number" step="any" name="mean texture" value="19.0" required></div>
                    <div class="input-group"><label>Mean Perimeter</label><input type="number" step="any" name="mean perimeter" value="90.0" required></div>
                    <div class="input-group"><label>Mean Area</label><input type="number" step="any" name="mean area" value="650.0" required></div>
                    <div class="input-group"><label>Mean Smoothness</label><input type="number" step="any" name="mean smoothness" value="0.09" required></div>
                    <div class="input-group"><label>Mean Compactness</label><input type="number" step="any" name="mean compactness" value="0.1" required></div>
                    <div class="input-group"><label>Mean Concavity</label><input type="number" step="any" name="mean concavity" value="0.09" required></div>
                    <div class="input-group"><label>Mean Concave Points</label><input type="number" step="any" name="mean concave points" value="0.05" required></div>
                    <div class="input-group"><label>Mean Symmetry</label><input type="number" step="any" name="mean symmetry" value="0.18" required></div>
                    <div class="input-group"><label>Mean Fractal Dim</label><input type="number" step="any" name="mean fractal dimension" value="0.06" required></div>
                </div>

                <!-- Error Values Tab -->
                <div id="tab-error" class="tab-content">
                     <div class="input-group"><label>Radius Error</label><input type="number" step="any" name="radius error" value="0.4" required></div>
                     <div class="input-group"><label>Texture Error</label><input type="number" step="any" name="texture error" value="1.2" required></div>
                     <div class="input-group"><label>Perimeter Error</label><input type="number" step="any" name="perimeter error" value="2.8" required></div>
                     <div class="input-group"><label>Area Error</label><input type="number" step="any" name="area error" value="40.0" required></div>
                     <div class="input-group"><label>Smoothness Error</label><input type="number" step="any" name="smoothness error" value="0.007" required></div>
                     <div class="input-group"><label>Compactness Error</label><input type="number" step="any" name="compactness error" value="0.025" required></div>
                     <div class="input-group"><label>Concavity Error</label><input type="number" step="any" name="concavity error" value="0.03" required></div>
                     <div class="input-group"><label>Concave Points Error</label><input type="number" step="any" name="concave points error" value="0.01" required></div>
                     <div class="input-group"><label>Symmetry Error</label><input type="number" step="any" name="symmetry error" value="0.02" required></div>
                     <div class="input-group"><label>Fractal Dim Error</label><input type="number" step="any" name="fractal dimension error" value="0.003" required></div>
                </div>

                <!-- Worst Values Tab -->
                <div id="tab-worst" class="tab-content">
                    <div class="input-group"><label>Worst Radius</label><input type="number" step="any" name="worst radius" value="16.0" required></div>
                    <div class="input-group"><label>Worst Texture</label><input type="number" step="any" name="worst texture" value="25.0" required></div>
                    <div class="input-group"><label>Worst Perimeter</label><input type="number" step="any" name="worst perimeter" value="105.0" required></div>
                    <div class="input-group"><label>Worst Area</label><input type="number" step="any" name="worst area" value="800.0" required></div>
                    <div class="input-group"><label>Worst Smoothness</label><input type="number" step="any" name="worst smoothness" value="0.13" required></div>
                    <div class="input-group"><label>Worst Compactness</label><input type="number" step="any" name="worst compactness" value="0.25" required></div>
                    <div class="input-group"><label>Worst Concavity</label><input type="number" step="any" name="worst concavity" value="0.27" required></div>
                    <div class="input-group"><label>Worst Concave Points</label><input type="number" step="any" name="worst concave points" value="0.11" required></div>
                    <div class="input-group"><label>Worst Symmetry</label><input type="number" step="any" name="worst symmetry" value="0.29" required></div>
                    <div class="input-group"><label>Worst Fractal Dim</label><input type="number" step="any" name="worst fractal dimension" value="0.08" required></div>
                </div>

                <button type="submit" class="btn-predict">Analyze</button>
            </form>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="result-title">Prediction Result</h2>
            <div id="resultLabel" class="result-value">---</div>
            <div id="resultProb" class="result-prob">Confidence: ---%</div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Activate selected
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        async function handlePredict(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-predict');
            btn.textContent = 'Processing...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => data[key] = value);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                } else {
                    showResult(result);
                }
            } catch (err) {
                alert('Connection Error');
            } finally {
                btn.textContent = 'Analyze';
                btn.disabled = false;
            }
        }

        function showResult(result) {
            const overlay = document.getElementById('modalOverlay');
            const labelEl = document.getElementById('resultLabel');
            const probEl = document.getElementById('resultProb');

            const isBenign = result.label === "Benign";
            // 0 = Malignant, 1 = Benign
            
            labelEl.textContent = result.label;
            labelEl.style.color = isBenign ? '#4ade80' : '#f43f5e'; // Green vs Red
            
            const prob = isBenign ? result.benign_probability : result.malignant_probability;
            probEl.textContent = `Confidence: ${(prob * 100).toFixed(2)}%`;

            overlay.classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }
    </script>
</body>
</html>
